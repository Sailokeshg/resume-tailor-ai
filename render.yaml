services:
  # Backend Web Service
  - type: web
    name: resume-tailor-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: OPENAI_API_KEY
        sync: false
      - key: DEFAULT_TAILOR_MODEL
        value: google/gemma-4-31b-it:free
      - key: KEYWORD_EXTRACTION_MODEL
        value: nvidia/nemotron-3-ultra-550b-a55b:free
      - key: MATCH_ANALYSIS_MODEL
        value: nvidia/nemotron-3-ultra-550b-a55b:free

  # Frontend Static Site
  - type: static
    name: resume-tailor-frontend
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: resume-tailor-backend
          property: host
